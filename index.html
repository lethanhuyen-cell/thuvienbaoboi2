<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baoboi.org - Hệ sinh thái Đọc & Nghe thông minh</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo: {
                            900: '#0f172a', // Deep Indigo / Slate 900
                        },
                        gold: {
                            500: '#f59e0b',
                            600: '#d97706',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    boxShadow: {
                        'premium': '0 20px 40px -15px rgba(79, 70, 229, 0.15)',
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
                    }
                }
            }
        }
    </script>

    <style>
        /* Subtle mesh gradient background cho khối Hero */
        .bg-mesh {
            background-color: #f8fafc;
            background-image:
                radial-gradient(at 40% 20%, hsla(238,100%,74%,0.15) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(271,100%,74%,0.15) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(238,100%,74%,0.15) 0px, transparent 50%);
        }

        /* Hiệu ứng màu vàng Gold cho Text VIP */
        .text-gradient-gold {
            background: linear-gradient(135deg, #d97706 0%, #fbbf24 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Hiệu ứng Glassmorphism Sáng */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Hiệu ứng Glassmorphism Tối (Dark mode cho Thiếu niên) */
        .dark-glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="font-sans text-slate-800 antialiased bg-mesh selection:bg-indigo-200 selection:text-indigo-900">

    <nav class="fixed w-full z-50 glass-panel border-b border-white/40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer">
                    <div class="w-10 h-10 bg-indigo-900 rounded-xl flex items-center justify-center shadow-lg">
                        <span class="text-white font-heading font-bold text-xl">B</span>
                    </div>
                    <span class="font-heading font-bold text-2xl tracking-tight text-indigo-900">Baoboi.org</span>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="#" class="text-slate-600 hover:text-indigo-900 font-medium transition-colors">Giải pháp</a>
                    <a href="#" class="text-slate-600 hover:text-indigo-900 font-medium transition-colors">Phân khúc</a>
                    <a href="#" class="text-slate-600 hover:text-indigo-900 font-medium transition-colors">Công nghệ AI</a>
                    <a href="#" class="text-slate-600 hover:text-indigo-900 font-medium transition-colors">Dành cho Cha mẹ</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="#" class="hidden md:block text-indigo-900 font-semibold hover:text-indigo-700">Đăng nhập</a>
                    <button class="bg-indigo-900 hover:bg-indigo-800 text-white px-6 py-2.5 rounded-full font-medium transition-all shadow-premium hover:-translate-y-0.5">
                        Trải nghiệm
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-20 lg:pt-48 lg:pb-32 px-4 overflow-hidden">
        <div class="max-w-7xl mx-auto text-center">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full glass-panel border border-indigo-100 mb-8 shadow-sm">
                <span class="flex h-2 w-2 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-gold-500 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-gold-600"></span>
                </span>
                <span class="text-sm font-semibold text-indigo-900">Trí tuệ nhân tạo thế hệ mới</span>
            </div>
